name: Deploy

# Builds the app and deploys to Firebase.
#  - push to main           -> deploy live hosting + Firestore rules + Cloud Functions
#  - pull request           -> deploy to a temporary preview channel (hosting only)
#
# Required GitHub repository secrets (Settings > Secrets and variables > Actions):
#   DOPPLER_TOKEN            A Doppler *service token* for project `dnd`, config `prd`
#                            (Doppler dashboard > dnd > prd > Access > Service Tokens).
#                            Injects the VITE_FIREBASE_* build vars.
#   FIREBASE_SERVICE_ACCOUNT The JSON key of a Firebase service account with deploy
#                            permissions. Hosting + rules need Firebase Hosting Admin +
#                            Cloud Datastore Owner. The Cloud Functions deploy step ALSO
#                            needs Cloud Functions Admin + Service Account User + Secret
#                            Manager access (functions load GMAIL_APP_PASSWORD from Secret
#                            Manager at runtime). If the SA lacks those, the functions
#                            step will fail — grant the roles or remove that step.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Node 22 (matches the functions runtime) for the Cloud Functions predeploy build.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - uses: dopplerhq/cli-action@v3

      - name: Build
        run: doppler run --token="$DOPPLER_TOKEN" -- bun run build:ci
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Deploy to live channel
        if: github.event_name == 'push'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: dandd-ea955
          # Pin firebase-tools: 15.22.1+ regressed against action-hosting-deploy@v0
          # ("supplied version ... is the current active version" on every release).
          # 15.22.0 is the last version this action deployed cleanly (2026-06-22).
          firebaseToolsVersion: "15.22.0"

      - name: Deploy preview channel
        if: github.event_name == 'pull_request'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: dandd-ea955
          firebaseToolsVersion: "15.22.0"

      - name: Deploy Firestore rules
        if: github.event_name == 'push'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          bunx firebase-tools@15.22.0 deploy --only firestore:rules \
            --project dandd-ea955 --non-interactive

      - name: Deploy Cloud Functions
        if: github.event_name == 'push'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          npm --prefix functions ci
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          bunx firebase-tools@15.22.0 deploy --only functions \
            --project dandd-ea955 --non-interactive
